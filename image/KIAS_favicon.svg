<svg width="512" height="512" viewBox="0 0 512 512" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>KIAS Favicon</title>

  <defs>
    <path id="top-arc"    d="M 56,256 a 200,200 0 1,1 400,0" />
    <path id="bottom-arc" d="M 56,256 a 200,200 0 0,0 400,0" />
  </defs>

  <!-- Outer circle -->
  <circle cx="256" cy="256" r="248" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#7c6fff" stroke-width="6"/>
  <circle cx="256" cy="256" r="224" fill="none" stroke="#3a3870" stroke-width="2"/>

  <!-- Key illustration -->
  <g transform="translate(256, 248)">
    <circle cx="-60" cy="0" r="52" fill="none" stroke="#e8e5ff" stroke-width="14"/>
    <circle cx="-60" cy="0" r="24" fill="none" stroke="#e8e5ff" stroke-width="10"/>
    <rect x="-10" y="-7" width="140" height="14" rx="7" fill="#e8e5ff"/>
    <rect x="30"  y="7"  width="14" height="22" rx="3" fill="#e8e5ff"/>
    <rect x="60"  y="7"  width="14" height="30" rx="3" fill="#e8e5ff"/>
    <rect x="90"  y="7"  width="14" height="18" rx="3" fill="#e8e5ff"/>
    <circle cx="-60" cy="0" r="52" fill="none" stroke="#7c6fff" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Top arc text -->
  <text font-family="system-ui, -apple-system, sans-serif"
    font-size="28" font-weight="400" letter-spacing="4" fill="#6662aa">
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">KURUMI INTRANET ACCOUNT SYSTEM</textPath>
  </text>

  <!-- Bottom arc text -->
  <text font-family="system-ui, -apple-system, sans-serif"
    font-size="28" font-weight="400" letter-spacing="4" fill="#6662aa">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">KIAS</textPath>
  </text>

  <!-- Ring dots -->
  <circle cx="256" cy="8"   r="5" fill="#7c6fff"/>
  <circle cx="256" cy="504" r="5" fill="#7c6fff"/>
  <circle cx="8"   cy="256" r="5" fill="#7c6fff"/>
  <circle cx="504" cy="256" r="5" fill="#7c6fff"/>
</svg>
